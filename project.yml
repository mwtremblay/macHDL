name: mac-hdl-gui
options:
  bundleIdPrefix: com.michaeltremblay
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 7QW68VQ33R
    CODE_SIGN_IDENTITY: "Apple Development"
targets:
  mac-hdl-gui:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Vendor/popstarter/POPSTARTER.ELF
        buildPhase: resources
      - path: Vendor/popstarter/POPSLOADER.ELF
        buildPhase: resources
      - path: Vendor/popstarter/PATCH_5.BIN
        buildPhase: resources
      # FreeHDBoot (FMCB 1.966) payload -- the exact file set copied to an
      # HDD by installer/system.c's HDDBaseFiles[]/PS2SysHDDFiles[] tables
      # in the upstream FreeMcBoot-Installer project. See FreeHDBootService
      # and FreeHDBootDestinationPaths for how these are used; MBR.XLF is
      # handled separately via hdl_dump inject_mbr, not copied as a plain
      # PFS file like the rest.
      - path: Vendor/FreeMcBoot-Installer/installer_res/1966/INSTALL/SYSTEM/MBR.XLF
        buildPhase: resources
      - path: Vendor/FreeMcBoot-Installer/installer_res/1966/INSTALL/SYSTEM/FHDB.XLF
        buildPhase: resources
      - path: Vendor/FreeMcBoot-Installer/installer_res/1966/INSTALL/SYSTEM/ENDVDPL.XRX
        buildPhase: resources
      - path: Vendor/FreeMcBoot-Installer/installer_res/1966/INSTALL/SYSTEM/FSCK/FSCK.XLF
        buildPhase: resources
      - path: Vendor/FreeMcBoot-Installer/installer_res/1966/INSTALL/SYSTEM/FSCK/LANG/NotoSans-Bold.ttf
        buildPhase: resources
      - path: Vendor/FreeMcBoot-Installer/installer_res/1966/INSTALL/SYSTEM/FSCK/LANG/NotoSansJP-Bold.otf
        buildPhase: resources
      - path: Vendor/FreeMcBoot-Installer/installer_res/1966/INSTALL/SYSTEM/FSCK/LANG/fonts.txt
        buildPhase: resources
      - path: Vendor/FreeMcBoot-Installer/installer_res/1966/INSTALL/SYSTEM/FSCK/LANG/strings_JA.txt
        buildPhase: resources
      - path: Vendor/FreeMcBoot-Installer/installer_res/1966/INSTALL/SYSTEM/FSCK/LANG/labels_JA.txt
        buildPhase: resources
      - path: Vendor/FreeMcBoot-Installer/installer_res/1966/INSTALL/SYSTEM/FSCK/LANG/strings_FR.txt
        buildPhase: resources
      - path: Vendor/FreeMcBoot-Installer/installer_res/1966/INSTALL/SYSTEM/FSCK/LANG/labels_FR.txt
        buildPhase: resources
      - path: Vendor/FreeMcBoot-Installer/installer_res/1966/INSTALL/SYSTEM/FSCK/LANG/strings_SP.txt
        buildPhase: resources
      - path: Vendor/FreeMcBoot-Installer/installer_res/1966/INSTALL/SYSTEM/FSCK/LANG/labels_SP.txt
        buildPhase: resources
      - path: Vendor/FreeMcBoot-Installer/installer_res/1966/INSTALL/SYSTEM/FSCK/LANG/strings_GE.txt
        buildPhase: resources
      - path: Vendor/FreeMcBoot-Installer/installer_res/1966/INSTALL/SYSTEM/FSCK/LANG/labels_GE.txt
        buildPhase: resources
      - path: Vendor/FreeMcBoot-Installer/installer_res/1966/INSTALL/SYSTEM/FSCK/LANG/strings_IT.txt
        buildPhase: resources
      - path: Vendor/FreeMcBoot-Installer/installer_res/1966/INSTALL/SYSTEM/FSCK/LANG/labels_IT.txt
        buildPhase: resources
      - path: Vendor/FreeMcBoot-Installer/installer_res/1966/INSTALL/SYSTEM/FSCK/LANG/strings_DU.txt
        buildPhase: resources
      - path: Vendor/FreeMcBoot-Installer/installer_res/1966/INSTALL/SYSTEM/FSCK/LANG/labels_DU.txt
        buildPhase: resources
      - path: Vendor/FreeMcBoot-Installer/installer_res/1966/INSTALL/SYSTEM/FSCK/LANG/strings_PO.txt
        buildPhase: resources
      - path: Vendor/FreeMcBoot-Installer/installer_res/1966/INSTALL/SYSTEM/FSCK/LANG/labels_PO.txt
        buildPhase: resources
      - path: Vendor/FreeMcBoot-Installer/installer_res/1966/INSTALL/SYS-CONF/FMCB_CFG.ELF
        buildPhase: resources
      - path: Vendor/FreeMcBoot-Installer/installer_res/1966/INSTALL/SYS-CONF/USBD.IRX
        buildPhase: resources
      - path: Vendor/FreeMcBoot-Installer/installer_res/1966/INSTALL/SYS-CONF/USBHDFSD.IRX
        buildPhase: resources
      # macHDL-maintained fork of FREEHDB.CNF (customized OSD menu -- see
      # FreeHDBootDestinationPaths.swift) plus the 3 "core" homebrew apps
      # (uLaunchELF, OPL, SMS) that menu points at, sourced from the same
      # vendored FreeMcBoot-Installer submodule as everything else above.
      - path: Resources/FreeHDBoot/FREEHDB.CNF
        buildPhase: resources
      - path: Resources/FreeHDBoot/ULE_ISR.ELF
        buildPhase: resources
      - path: Resources/FreeHDBoot/OPL110.ELF
        buildPhase: resources
      - path: Resources/FreeHDBoot/SMS.ELF
        buildPhase: resources
    dependencies:
      - target: mac-hdl-gui-helper
        embed: false      # not a framework/plugin -- placed manually by embed-helper.sh
        codeSign: false   # embed-helper.sh codesigns it independently
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.michaeltremblay.machdl
        PRODUCT_NAME: macHDL
        CODE_SIGN_ENTITLEMENTS: macHDL.entitlements
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0.4"
        CURRENT_PROJECT_VERSION: "2"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        ENABLE_APP_SANDBOX: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    preBuildScripts:
      - name: "Build & Embed hdl_dump"
        script: |
          "${SRCROOT}/Scripts/build-hdl-dump.sh"
        inputFiles:
          - "$(SRCROOT)/Vendor/hdl-dump/hdl_dump.c"
          - "$(SRCROOT)/Vendor/hdl-dump/Makefile"
          - "$(SRCROOT)/Vendor/hdl-dump-macos.patch"
        outputFiles:
          - "$(CODESIGNING_FOLDER_PATH)/Contents/Resources/hdl-dump-bin/hdl_dump"
        basedOnDependencyAnalysis: false
      - name: "Build & Embed pfsshell"
        script: |
          "${SRCROOT}/Scripts/build-pfsshell.sh"
        inputFiles:
          - "$(SRCROOT)/Vendor/pfsshell/meson.build"
          - "$(SRCROOT)/Vendor/pfsshell-pfsutil.patch"
          - "$(SRCROOT)/Scripts/pfsutil-src/pfsutil.c"
        outputFiles:
          - "$(CODESIGNING_FOLDER_PATH)/Contents/Resources/pfsshell-bin/pfsshell"
          - "$(CODESIGNING_FOLDER_PATH)/Contents/Resources/pfsshell-bin/pfsutil"
        basedOnDependencyAnalysis: false
      - name: "Build & Embed cue2pops"
        script: |
          "${SRCROOT}/Scripts/build-cue2pops.sh"
        inputFiles:
          - "$(SRCROOT)/Vendor/cue2pops-mac/cue2pops.c"
          - "$(SRCROOT)/Vendor/cue2pops-mac/Makefile"
        outputFiles:
          - "$(CODESIGNING_FOLDER_PATH)/Contents/Resources/cue2pops-bin/cue2pops"
        basedOnDependencyAnalysis: false
      - name: "Build & Embed psx-vcd"
        script: |
          "${SRCROOT}/Scripts/build-psxvcd.sh"
        inputFiles:
          - "$(SRCROOT)/Vendor/psx-vcd/Cargo.toml"
          - "$(SRCROOT)/Vendor/psx-vcd/Cargo.lock"
          - "$(SRCROOT)/Vendor/psx-vcd/src/main.rs"
          - "$(SRCROOT)/Vendor/psx-vcd/src/cue.rs"
          - "$(SRCROOT)/Vendor/psx-vcd/src/vcd.rs"
          - "$(SRCROOT)/Vendor/psx-vcd/src/combiner.rs"
          - "$(SRCROOT)/Vendor/psx-vcd/src/utils.rs"
        outputFiles:
          - "$(CODESIGNING_FOLDER_PATH)/Contents/Resources/psxvcd-bin/psx-vcd"
        basedOnDependencyAnalysis: false
      - name: "Build & Embed unar"
        script: |
          "${SRCROOT}/Scripts/build-unar.sh"
        inputFiles:
          - "$(SRCROOT)/Vendor/XADMaster/XADMaster.xcodeproj/project.pbxproj"
          - "$(SRCROOT)/Vendor/XADMaster/unar.m"
          - "$(SRCROOT)/Vendor/universal-detector/UniversalDetector.m"
        outputFiles:
          - "$(CODESIGNING_FOLDER_PATH)/Contents/Resources/unar-bin/unar"
        basedOnDependencyAnalysis: false
      - name: "Build & Embed ffmpeg"
        script: |
          "${SRCROOT}/Scripts/build-ffmpeg.sh"
        inputFiles:
          - "$(SRCROOT)/Vendor/ffmpeg-src/ffmpeg-8.1.2.tar.xz"
          - "$(SRCROOT)/Vendor/lame-src/lame-4.0.tar.gz"
        outputFiles:
          - "$(CODESIGNING_FOLDER_PATH)/Contents/Resources/ffmpeg-bin/ffmpeg"
        basedOnDependencyAnalysis: false
    postCompileScripts:
      - name: "Embed Privileged Helper"
        script: |
          "${SRCROOT}/Scripts/embed-helper.sh"
        inputFiles:
          - "$(BUILT_PRODUCTS_DIR)/com.michaeltremblay.machdl.helper"
          - "$(SRCROOT)/HelperTool/com.michaeltremblay.machdl.helper.plist"
        outputFiles:
          - "$(CODESIGNING_FOLDER_PATH)/Contents/Library/HelperTools/com.michaeltremblay.machdl.helper"
          - "$(CODESIGNING_FOLDER_PATH)/Contents/Library/LaunchDaemons/com.michaeltremblay.machdl.helper.plist"
        basedOnDependencyAnalysis: false
  mac-hdl-gui-helper:
    type: tool
    platform: macOS
    sources:
      - path: HelperTool
        excludes:
          - "com.michaeltremblay.machdl.helper.plist"
      - path: Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.michaeltremblay.machdl.helper
        PRODUCT_NAME: com.michaeltremblay.machdl.helper
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        # This target's own build doesn't need to produce a validly-signed
        # binary -- embed-helper.sh re-signs it with the real identity once
        # it's copied into the app bundle. Avoids requiring a "Mac
        # Development"-flavored cert match during automatic signing here.
        CODE_SIGNING_ALLOWED: NO
  mac-hdl-guiTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: mac-hdl-gui
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        # xcodegen derives the default TEST_HOST/BUNDLE_LOADER from the
        # dependency target's structural name (mac-hdl-gui), not its
        # PRODUCT_NAME (macHDL) -- override explicitly to match the real
        # built app name.
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/macHDL.app/Contents/MacOS/macHDL"
schemes:
  mac-hdl-gui:
    build:
      targets:
        mac-hdl-gui: all
        mac-hdl-guiTests: [test]
    test:
      targets:
        - mac-hdl-guiTests
