name: mac-hdl-gui
options:
  bundleIdPrefix: com.michaeltremblay
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 7QW68VQ33R
    CODE_SIGN_IDENTITY: "Apple Development"
targets:
  mac-hdl-gui:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Vendor/popstarter/POPSTARTER.ELF
        buildPhase: resources
      - path: Vendor/popstarter/POPSLOADER.ELF
        buildPhase: resources
      - path: Vendor/popstarter/PATCH_5.BIN
        buildPhase: resources
    dependencies:
      - target: mac-hdl-gui-helper
        embed: false      # not a framework/plugin -- placed manually by embed-helper.sh
        codeSign: false   # embed-helper.sh codesigns it independently
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.michaeltremblay.machdl
        PRODUCT_NAME: macHDL
        CODE_SIGN_ENTITLEMENTS: macHDL.entitlements
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        ENABLE_APP_SANDBOX: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    preBuildScripts:
      - name: "Build & Embed hdl_dump"
        script: |
          "${SRCROOT}/Scripts/build-hdl-dump.sh"
        inputFiles:
          - "$(SRCROOT)/Vendor/hdl-dump/hdl_dump.c"
          - "$(SRCROOT)/Vendor/hdl-dump/Makefile"
          - "$(SRCROOT)/Vendor/hdl-dump-macos.patch"
        outputFiles:
          - "$(CODESIGNING_FOLDER_PATH)/Contents/Resources/hdl-dump-bin/hdl_dump"
        basedOnDependencyAnalysis: false
      - name: "Build & Embed pfsshell"
        script: |
          "${SRCROOT}/Scripts/build-pfsshell.sh"
        inputFiles:
          - "$(SRCROOT)/Vendor/pfsshell/meson.build"
          - "$(SRCROOT)/Vendor/pfsshell-pfsutil.patch"
          - "$(SRCROOT)/Scripts/pfsutil-src/pfsutil.c"
        outputFiles:
          - "$(CODESIGNING_FOLDER_PATH)/Contents/Resources/pfsshell-bin/pfsshell"
          - "$(CODESIGNING_FOLDER_PATH)/Contents/Resources/pfsshell-bin/pfsutil"
        basedOnDependencyAnalysis: false
      - name: "Build & Embed cue2pops"
        script: |
          "${SRCROOT}/Scripts/build-cue2pops.sh"
        inputFiles:
          - "$(SRCROOT)/Vendor/cue2pops-mac/cue2pops.c"
          - "$(SRCROOT)/Vendor/cue2pops-mac/Makefile"
        outputFiles:
          - "$(CODESIGNING_FOLDER_PATH)/Contents/Resources/cue2pops-bin/cue2pops"
        basedOnDependencyAnalysis: false
    postCompileScripts:
      - name: "Embed Privileged Helper"
        script: |
          "${SRCROOT}/Scripts/embed-helper.sh"
        inputFiles:
          - "$(BUILT_PRODUCTS_DIR)/com.michaeltremblay.machdl.helper"
          - "$(SRCROOT)/HelperTool/com.michaeltremblay.machdl.helper.plist"
        outputFiles:
          - "$(CODESIGNING_FOLDER_PATH)/Contents/Library/HelperTools/com.michaeltremblay.machdl.helper"
          - "$(CODESIGNING_FOLDER_PATH)/Contents/Library/LaunchDaemons/com.michaeltremblay.machdl.helper.plist"
        basedOnDependencyAnalysis: false
  mac-hdl-gui-helper:
    type: tool
    platform: macOS
    sources:
      - path: HelperTool
        excludes:
          - "com.michaeltremblay.machdl.helper.plist"
      - path: Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.michaeltremblay.machdl.helper
        PRODUCT_NAME: com.michaeltremblay.machdl.helper
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        # This target's own build doesn't need to produce a validly-signed
        # binary -- embed-helper.sh re-signs it with the real identity once
        # it's copied into the app bundle. Avoids requiring a "Mac
        # Development"-flavored cert match during automatic signing here.
        CODE_SIGNING_ALLOWED: NO
  mac-hdl-guiTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: mac-hdl-gui
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        # xcodegen derives the default TEST_HOST/BUNDLE_LOADER from the
        # dependency target's structural name (mac-hdl-gui), not its
        # PRODUCT_NAME (macHDL) -- override explicitly to match the real
        # built app name.
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/macHDL.app/Contents/MacOS/macHDL"
schemes:
  mac-hdl-gui:
    build:
      targets:
        mac-hdl-gui: all
        mac-hdl-guiTests: [test]
    test:
      targets:
        - mac-hdl-guiTests
